{
    "target": "linux/amd64",
    "http": "127.0.0.1:56742",
    "workdir": "__DIR__/workdir-gadget-fw",
    "kernel_obj": "__DIR__/linux",
    "sshkey": "__DIR__/qemu/id_rsa",
    "syzkaller": "__DIR__/syzkaller",
    "sandbox": "none",
    "procs": 4,
    "type": "qemu",
    "vm": {
        "count": 2,
        "kernel": "__DIR__/bzImage",
        "initrd": "__DIR__/qemu/initramfs.cpio.gz",
        "cpu": 2,
        "mem": 2048,
        "cmdline": "console=ttyS0 panic=-1 oops=panic kasan_multi_shot nokaslr"
    },
    "enable_syscalls": [
        "syz_usb_connect",
        "syz_usb_connect_ex",
        "syz_usb_disconnect",
        "syz_usb_control_io",
        "syz_usb_ep_write",
        "syz_usb_ep_read",
        "openat$usb_func_fs",
        "ioctl$FUNCTIONFS_FIFO_STATUS",
        "ioctl$FUNCTIONFS_FIFO_FLUSH",
        "ioctl$FUNCTIONFS_CLEAR_HALT",
        "ioctl$FUNCTIONFS_INTERFACE_REVMAP",
        "ioctl$FUNCTIONFS_ENDPOINT_REVMAP",
        "ioctl$FUNCTIONFS_ENDPOINT_DESC",
        "write$usb_func_fs",
        "read$usb_func_fs",
        "mkdir",
        "rmdir",
        "symlink",
        "write",
        "read",
        "openat"
    ]
}
