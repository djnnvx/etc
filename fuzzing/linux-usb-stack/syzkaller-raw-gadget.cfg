{
    "target": "linux/amd64",
    "http": "127.0.0.1:56741",
    "workdir": "__DIR__/workdir-raw-gadget",
    "kernel_obj": "__DIR__/linux",
    "sshkey": "__DIR__/qemu/id_rsa",
    "syzkaller": "__DIR__/syzkaller",
    "sandbox": "none",
    "procs": 4,
    "type": "qemu",
    "vm": {
        "count": 2,
        "kernel": "__DIR__/bzImage",
        "initrd": "__DIR__/qemu/initramfs.cpio.gz",
        "cpu": 2,
        "mem": 2048,
        "cmdline": "console=ttyS0 panic=-1 oops=panic kasan_multi_shot nokaslr"
    },
    "enable_syscalls": [
        "syz_usb_connect",
        "syz_usb_connect_ex",
        "syz_usb_disconnect",
        "syz_usb_control_io",
        "syz_usb_ep_write",
        "syz_usb_ep_read",
        "openat$/dev/raw-gadget",
        "ioctl$USB_RAW_IOCTL_INIT",
        "ioctl$USB_RAW_IOCTL_RUN",
        "ioctl$USB_RAW_IOCTL_EVENT_FETCH",
        "ioctl$USB_RAW_IOCTL_EP0_WRITE",
        "ioctl$USB_RAW_IOCTL_EP0_READ",
        "ioctl$USB_RAW_IOCTL_EP_ENABLE",
        "ioctl$USB_RAW_IOCTL_EP_DISABLE",
        "ioctl$USB_RAW_IOCTL_EP_WRITE",
        "ioctl$USB_RAW_IOCTL_EP_READ",
        "ioctl$USB_RAW_IOCTL_CONFIGURE",
        "ioctl$USB_RAW_IOCTL_VBUS_DRAW",
        "ioctl$USB_RAW_IOCTL_EPS_INFO",
        "ioctl$USB_RAW_IOCTL_EP0_STALL",
        "ioctl$USB_RAW_IOCTL_EP_SET_HALT",
        "ioctl$USB_RAW_IOCTL_EP_CLEAR_HALT",
        "ioctl$USB_RAW_IOCTL_EP_SET_WEDGE"
    ]
}
