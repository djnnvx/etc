{
    "target": "linux/amd64",
    "http": "127.0.0.1:56743",
    "workdir": "__DIR__/workdir-usbfs",
    "kernel_obj": "__DIR__/linux",
    "sshkey": "__DIR__/qemu/id_rsa",
    "syzkaller": "__DIR__/syzkaller",
    "sandbox": "none",
    "procs": 4,
    "type": "qemu",
    "vm": {
        "count": 2,
        "kernel": "__DIR__/bzImage",
        "initrd": "__DIR__/qemu/initramfs.cpio.gz",
        "cpu": 2,
        "mem": 2048,
        "cmdline": "console=ttyS0 panic=-1 oops=panic kasan_multi_shot nokaslr"
    },
    "enable_syscalls": [
        "syz_usb_connect",
        "syz_usb_connect_ex",
        "syz_usb_disconnect",
        "openat$/dev/bus/usb",
        "ioctl$USBDEVFS_CONTROL",
        "ioctl$USBDEVFS_BULK",
        "ioctl$USBDEVFS_RESETEP",
        "ioctl$USBDEVFS_SETINTERFACE",
        "ioctl$USBDEVFS_SETCONFIGURATION",
        "ioctl$USBDEVFS_GETDRIVER",
        "ioctl$USBDEVFS_SUBMITURB",
        "ioctl$USBDEVFS_DISCARDURB",
        "ioctl$USBDEVFS_REAPURB",
        "ioctl$USBDEVFS_REAPURBNDELAY",
        "ioctl$USBDEVFS_CLAIMINTERFACE",
        "ioctl$USBDEVFS_RELEASEINTERFACE",
        "ioctl$USBDEVFS_CONNECTINFO",
        "ioctl$USBDEVFS_IOCTL",
        "ioctl$USBDEVFS_RESET",
        "ioctl$USBDEVFS_CLEAR_HALT",
        "ioctl$USBDEVFS_DISCONNECT",
        "ioctl$USBDEVFS_CONNECT",
        "ioctl$USBDEVFS_ALLOC_STREAMS",
        "ioctl$USBDEVFS_FREE_STREAMS",
        "ioctl$USBDEVFS_DROP_PRIVILEGES",
        "ioctl$USBDEVFS_GET_SPEED"
    ]
}
